<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Message envoyé – Immo Hoessen</title>
  <link rel="stylesheet" href="style.css">

  <style>
    :root{
      --green:#0f3d2e; --text:#1e4e3d; --muted:#557a68;
      --brand:#1a5cff; --brand-hover:#003b8a;
      --warm-25:#fff9f3; --warm-50:#fff3e5;
    }

    body{
      margin:0;
      font-family:system-ui, sans-serif;
      background: radial-gradient(120% 120% at 50% -10%, var(--warm-25) 0%, #ffffff 45%);
      color:var(--text);
      display:flex;
      flex-direction:column;
      min-height:100vh;
    }

    .success-container{
      max-width:600px;
      margin:5rem auto 0;
      background:#fff;
      padding:2rem;
      border-radius:16px;
      border-left:12px solid var(--brand);
      box-shadow:0 10px 26px rgba(0,0,0,.08);
      text-align:center;
      animation:fadeIn .6s ease;
    }

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(20px);}
      to{opacity:1; transform:translateY(0);}
    }

    h1{
      margin:0 0 1rem;
      color:var(--brand);
      font-size:1.8rem;
      font-weight:800;
    }

    p{
      margin:0 0 1.6rem;
      line-height:1.6;
      color:var(--text);
    }

    a.btn{
      display:inline-block;
      background:var(--brand);
      color:#fff;
      padding:.85rem 1.4rem;
      border-radius:12px;
      text-decoration:none;
      font-weight:700;
      transition:.2s ease;
    }

    a.btn:hover{
      background:var(--brand-hover);
      transform:translateY(-2px);
    }

    footer{
      margin-top:auto;
      text-align:center;
      padding:1.2rem;
      color:var(--muted);
      font-size:.9rem;
    }
  </style>
</head>

<body>

  <div class="success-container">
    <h1>Message envoyé !</h1>
    <p>
      Merci pour votre demande.<br>
      Votre message a été transmis avec succès à notre équipe du syndic.<br>
      Nous vous répondrons dans les plus brefs délais.
    </p>

    <a href="index.html" class="btn">Retour à l’accueil</a>
  </div>

  <footer>
    © 2025 Immo Hoessen · Tous droits réservés
  </footer>

</body>
</html>
