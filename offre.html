<form action="https://api.web3forms.com/submit" method="POST" class="offer-card">

  <!-- CHAVE WEB3FORMS -->
  <input type="hidden" name="access_key" value="2715b787-9245-44e3-b889-a4d44ef68754">

  <!-- Assunto -->
  <input type="hidden" name="subject" value="Nouvelle demande d'offre - Immo Hoessen">

  <!-- Página de sucesso -->
  <input type="hidden" name="redirect" value="https://fabivilmen.github.io/immohoessen-site-v2/success.html">

  <div class="grid">
    <div class="field">
      <label for="nom">Nom <span class="req">*</span></label>
      <input id="nom" name="Nom" type="text" required>
    </div>
    <div class="field">
      <label for="email">Email<span class="req">*</span></label>
      <input id="email" name="Email" type="email" required>
    </div>
  </div>

  <div class="grid">
    <div class="field">
      <label for="tel">Téléphone</label>
      <input id="tel" name="Téléphone" type="tel" placeholder="ex. 02 772 51 75">
    </div>
    <div class="field">
      <label for="addr">Adresse de la copropriété<span class="req">*</span></label>
      <input id="addr" name="Adresse de la copropriété" type="text" required>
    </div>
  </div>

  <div class="grid">
    <div class="field">
      <label for="cp">Code postal</label>
      <input id="cp" name="Code postal" type="text" inputmode="numeric" pattern="\\d{4,5}" placeholder="4–5 chiffres">
    </div>
    <div class="field">
      <label for="etages">Nombre d’étages<span class="req">*</span></label>
      <input id="etages" name="Nombre d’étages" type="number" min="0" step="1" required>
    </div>
  </div>

  <div class="grid-3">
    <div class="field">
      <label for="chauff">Chauffage collectif</label>
      <select id="chauff" name="Chauffage collectif">
        <option>Oui</option><option>Non</option><option>Je ne sais pas</option>
      </select>
    </div>
    <div class="field">
      <label for="garage">Garage</label>
      <select id="garage" name="Garage">
        <option>Oui</option><option>Non</option><option>Je ne sais pas</option>
      </select>
    </div>
    <div class="field">
      <label for="asc">Ascenseur<span class="req">*</span></label>
      <select id="asc" name="Ascenseur" required>
        <option>Oui</option><option>Non</option>
      </select>
    </div>
  </div>

  <div class="grid">
    <div class="field">
      <label for="syn">Syndic en place ?</label>
      <select id="syn" name="Syndic en place">
        <option>Oui</option><option>Non</option><option>Je ne sais pas</option>
      </select>
    </div>
    <div class="field">
      <label for="apts">Nombre d’appartements</label>
      <input id="apts" name="Nombre d’appartements" type="number" min="0" step="1" placeholder="ex. 24">
    </div>
  </div>

  <div class="grid-1">
    <div class="field">
      <label for="msg">Message</label>
      <textarea id="msg" name="Message" placeholder="Votre demande, échéances, particularités..."></textarea>
    </div>
  </div>

  <div class="actions">
    <button class="btn-primary" type="submit">Envoyer</button>
  </div>

</form>

<p class="hint">Votre demande sera envoyée directement à <strong>syndic@immohoessen.be</strong>.</p>
